name: Deploy Flutter Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test AI proxy
        working-directory: backend
        run: npm test

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        env:
          QIVO_AI_PROXY_URL: ${{ vars.QIVO_AI_PROXY_URL }}
          QIVO_AI_MODEL: ${{ vars.QIVO_AI_MODEL || 'openai/gpt-oss-20b' }}
          QIVO_STT_MODEL: ${{ vars.QIVO_STT_MODEL || 'whisper-large-v3-turbo' }}
        run: >
          flutter build web --release
          --base-href /Qivo-2027/
          --dart-define=QIVO_AI_PROXY_URL="$QIVO_AI_PROXY_URL"
          --dart-define=QIVO_AI_MODEL="$QIVO_AI_MODEL"
          --dart-define=QIVO_STT_MODEL="$QIVO_STT_MODEL"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
